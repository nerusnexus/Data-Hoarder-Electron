<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Hoarder</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="toggle-sidebar" class="icon-btn">
                    <i data-lucide="menu"></i>
                </button>
                <h2 class="sidebar-title text-content">Hoarder</h2>
            </div>
            
            <div class="nav-container">
                <div class="active-indicator" id="active-indicator"></div>

                <button class="nav-btn active" data-target="view-dashboard">
                    <i data-lucide="layout-dashboard" class="lucide-icon"></i>
                    <span class="text-content">Dashboard</span>
                </button>
                <button class="nav-btn" data-target="view-ytdlp">
                    <i data-lucide="video" class="lucide-icon"></i>
                    <span class="text-content">yt-dlp</span>
                </button>
                <button class="nav-btn" data-target="view-insta">
                    <i data-lucide="instagram" class="lucide-icon"></i>
                    <span class="text-content">Insta</span>
                </button>
                <button class="nav-btn" data-target="view-db">
                    <i data-lucide="database" class="lucide-icon"></i>
                    <span class="text-content">Database</span>
                </button>
                <button class="nav-btn" data-target="view-settings">
                    <i data-lucide="settings" class="lucide-icon"></i>
                    <span class="text-content">Settings</span>
                </button>
            </div>
        </aside>

        <main class="content">
            <section id="view-dashboard" class="view active">
                <div class="tabs">
                    <button class="tab-btn active" data-target="dash-overview">Overview</button>
                    <button class="tab-btn" data-target="dash-details">Details</button>
                </div>
                <div class="tab-content">
                    <div id="dash-overview" class="tab-pane active"><h3>Library Overview</h3></div>
                    <div id="dash-details" class="tab-pane"><h3>Library Details</h3></div>
                </div>
            </section>

            <section id="view-ytdlp" class="view">
                <div class="tabs">
                    <button class="tab-btn active" data-target="yt-library">Library</button>
                    <button class="tab-btn" data-target="yt-fetch">Fetch Metadata</button>
                    <button class="tab-btn" data-target="yt-download">Download Videos</button>
                </div>
                <div class="tab-content">
                    <div id="yt-library" class="tab-pane active"><h3>Library Settings</h3></div>
                    <div id="yt-fetch" class="tab-pane"><h3>Fetch Metadata</h3></div>
                    <div id="yt-download" class="tab-pane">
                     <h3>Download Engine</h3>
                     <br>
                        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                             <input type="text" id="video-url-input" placeholder="Enter video URL..." 
                                  style="flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border-subtle); background: var(--bg-darker); color: var(--text-main);">
                            <button id="download-btn" 
                                style="padding: 10px 20px; border-radius: 8px; border: none; background: var(--primary-purple); color: white; cursor: pointer; font-weight: bold;">
                            Download
                        </button>
                        </div>
                        <div id="output-console" style="padding: 15px; background: var(--bg-darker); border-radius: 8px; border: 1px solid var(--border-subtle); min-height: 100px; color: var(--text-muted); font-family: monospace;">
                            Waiting for input...
                        </div>
</div>
                </div>
            </section>

            <section id="view-insta" class="view"><h2>Instaloader Environment</h2></section>
            <section id="view-db" class="view"><h2>Database Management</h2></section>
            <section id="view-settings" class="view"><h2>Application Settings</h2></section>
        </main>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
